version: "3"

services:
  # The Target: An intentionally vulnerable web application
  juice-shop:
    image: bkimminich/juice-shop
    ports:
      - "3000:3000"
    networks:
      - aegis-net

  # The Scanner: OWASP ZAP (Zed Attack Proxy) running in daemon/API mode
  zap:
    image: zaproxy/zap-stable
    # Run ZAP as a daemon (no UI), listening on all interfaces on port 8080, disable API key for easy internal access
    command: zap.sh -daemon -host 0.0.0.0 -port 8080 -config api.disablekey=true -config api.addrs.addr.name=.* -config api.addrs.addr.regex=true
    ports:
      - "8081:8080" # Maps localhost:8081 to ZAP's internal 8080 port
    networks:
      - aegis-net
    depends_on:
      - juice-shop

networks:
  aegis-net:
    driver: bridge
